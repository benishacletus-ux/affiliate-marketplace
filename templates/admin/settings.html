{% extends "admin/admin_base.html" %}

{% block title %}Settings - Admin Panel{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-cog"></i> Settings</h1>
        <p>Manage your site configuration</p>
    </div>

    <div class="settings-grid">
        <!-- General Settings -->
        <div class="settings-card">
            <div class="settings-card-header">
                <i class="fas fa-globe"></i>
                <h3>General Settings</h3>
            </div>
            <div class="settings-card-body">
                <div class="form-group">
                    <label>Site Name</label>
                    <input type="text" class="form-control" value="Affiliate Marketplace" placeholder="Site Name">
                </div>
                <div class="form-group">
                    <label>Site Description</label>
                    <textarea class="form-control" rows="3" placeholder="Site Description">Your premier affiliate marketing platform</textarea>
                </div>
                <div class="form-group">
                    <label>Contact Email</label>
                    <input type="email" class="form-control" value="admin@affiliate.com" placeholder="Contact Email">
                </div>
            </div>
        </div>

        <!-- Commission Settings -->
        <div class="settings-card">
            <div class="settings-card-header">
                <i class="fas fa-percent"></i>
                <h3>Commission Settings</h3>
            </div>
            <div class="settings-card-body">
                <div class="form-group">
                    <label>Default Commission Rate (%)</label>
                    <input type="number" class="form-control" value="10" step="0.5">
                </div>
                <div class="form-group">
                    <label>Minimum Payout Amount</label>
                    <input type="number" class="form-control" value="50" step="10">
                </div>
                <div class="form-group">
                    <label>Cookie Duration (days)</label>
                    <input type="number" class="form-control" value="30">
                </div>
            </div>
        </div>

        <!-- Payment Settings -->
        <div class="settings-card">
            <div class="settings-card-header">
                <i class="fas fa-credit-card"></i>
                <h3>Payment Settings</h3>
            </div>
            <div class="settings-card-body">
                <div class="form-group">
                    <label>Currency</label>
                    <select class="form-control">
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                        <option value="INR">INR - Indian Rupee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Payment Gateway</label>
                    <select class="form-control">
                        <option value="paypal">PayPal</option>
                        <option value="stripe">Stripe</option>
                        <option value="razorpay">Razorpay</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Email Settings -->
        <div class="settings-card">
            <div class="settings-card-header">
                <i class="fas fa-envelope"></i>
                <h3>Email Settings</h3>
            </div>
            <div class="settings-card-body">
                <div class="form-group">
                    <label>SMTP Host</label>
                    <input type="text" class="form-control" placeholder="smtp.gmail.com">
                </div>
                <div class="form-group">
                    <label>SMTP Port</label>
                    <input type="number" class="form-control" value="587">
                </div>
                <div class="form-group">
                    <label>SMTP Username</label>
                    <input type="text" class="form-control" placeholder="your-email@gmail.com">
                </div>
                <div class="form-group">
                    <label>SMTP Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
            </div>
        </div>

        <!-- SEO Settings -->
        <div class="settings-card">
            <div class="settings-card-header">
                <i class="fas fa-search"></i>
                <h3>SEO Settings</h3>
            </div>
            <div class="settings-card-body">
                <div class="form-group">
                    <label>Meta Title</label>
                    <input type="text" class="form-control" value="Affiliate Marketplace - Best Deals">
                </div>
                <div class="form-group">
                    <label>Meta Description</label>
                    <textarea class="form-control" rows="2">Discover the best affiliate products and earn commissions</textarea>
                </div>
                <div class="form-group">
                    <label>Meta Keywords</label>
                    <input type="text" class="form-control" value="affiliate, marketing, products, deals">
                </div>
            </div>
        </div>

        <!-- Security Settings -->
        <div class="settings-card">
            <div class="settings-card-header">
                <i class="fas fa-shield-alt"></i>
                <h3>Security Settings</h3>
            </div>
            <div class="settings-card-body">
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> Enable Two-Factor Authentication
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" checked> Require Email Verification
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox"> Force HTTPS
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="form-actions">
        <button type="button" class="btn-primary" onclick="alert('Settings saved successfully!')">
            <i class="fas fa-save"></i> Save Settings
        </button>
        <button type="button" class="btn-outline" onclick="location.reload()">
            <i class="fas fa-undo"></i> Reset
        </button>
    </div>
</div>

<style>
.admin-container {
    padding: 20px;
    max-width: 1400px;
    margin: 0 auto;
}

.admin-header {
    margin-bottom: 30px;
}

.admin-header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 10px;
}

.admin-header p {
    color: #666;
}

.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 25px;
    margin-bottom: 30px;
}

.settings-card {
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}

.settings-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    background: #f8f9fa;
    border-bottom: 1px solid #e0e0e0;
}

.settings-card-header i {
    font-size: 1.3rem;
    color: #1a1a1a;
}

.settings-card-header h3 {
    margin: 0;
    font-size: 1.1rem;
    color: #1a1a1a;
}

.settings-card-body {
    padding: 20px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 0.85rem;
    color: #1a1a1a;
}

.form-control {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    transition: 0.2s;
}

.form-control:focus {
    outline: none;
    border-color: #1a1a1a;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
}

textarea.form-control {
    resize: vertical;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-weight: normal;
}

.checkbox-label input {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: flex-end;
    margin-top: 20px;
}

.btn-primary, .btn-outline {
    padding: 12px 28px;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    cursor: pointer;
    border: none;
}

.btn-primary {
    background: #1a1a1a;
    color: #ffffff;
}

.btn-primary:hover {
    background: #333333;
    transform: translateY(-2px);
}

.btn-outline {
    background: transparent;
    border: 1px solid #e0e0e0;
    color: #666;
}

.btn-outline:hover {
    background: #f5f5f5;
    transform: translateY(-2px);
}

@media (max-width: 768px) {
    .admin-container {
        padding: 15px;
    }
    
    .settings-grid {
        grid-template-columns: 1fr;
        gap: 15px;
    }
    
    .form-actions {
        flex-direction: column;
    }
    
    .form-actions .btn-primary,
    .form-actions .btn-outline {
        width: 100%;
        justify-content: center;
    }
}
</style>
{% endblock %}
