{% extends "base.html" %}

{% block title %}Login - Affiliate Marketplace{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon-wrapper">
                <i class="fas fa-store auth-icon"></i>
            </div>
            <h2>Welcome Back!</h2>
            <p>Login to your account</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-primary auth-submit">
                Login <i class="fas fa-arrow-right"></i>
            </button>
        </form>
        
        <div class="auth-divider">
            <span>Demo Access</span>
        </div>
        
        <div class="demo-credentials">
            <div class="demo-card">
                <i class="fas fa-user-shield"></i>
                <div>
                    <strong>Admin Account</strong>
                    <code>admin / admin123</code>
                </div>
            </div>
        </div>
        
        <div class="auth-footer">
            <a href="{{ url_for('index') }}" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<style>
/* ============================================
   LOGIN PAGE - WHITE THEME / BLACK ACCENTS
   ============================================ */

.auth-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.auth-card {
    max-width: 450px;
    width: 100%;
    padding: 40px;
    border-radius: 28px;
    text-align: center;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    transition: 0.2s;
}

.auth-icon-wrapper {
    width: 80px;
    height: 80px;
    background: #f8f8f8;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    border: 1px solid #e0e0e0;
}

.auth-icon {
    font-size: 2.5rem;
    color: #1a1a1a;
}

.auth-header h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #1a1a1a;
}

.auth-header p {
    color: #888;
    font-size: 0.9rem;
}

.auth-form {
    margin: 30px 0;
}

.auth-form .form-group {
    text-align: left;
    margin-bottom: 20px;
}

.auth-form label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 0.85rem;
    color: #1a1a1a;
}

.auth-form label i {
    margin-right: 8px;
    color: #888;
}

.auth-form input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.95rem;
    transition: all 0.2s;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    color: #1a1a1a;
}

.auth-form input:focus {
    outline: none;
    border-color: #1a1a1a;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
}

.auth-form input::placeholder {
    color: #bbb;
}

.auth-submit {
    width: 100%;
    justify-content: center;
    margin-top: 15px;
    padding: 12px 24px;
    background: #1a1a1a;
    color: #ffffff;
    border: none;
    border-radius: 40px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
}

.auth-submit:hover {
    background: #333333;
    transform: translateY(-2px);
}

.auth-divider {
    position: relative;
    text-align: center;
    margin: 25px 0 20px;
}

.auth-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: #e0e0e0;
}

.auth-divider span {
    display: inline-block;
    padding: 0 15px;
    background: #ffffff;
    position: relative;
    font-size: 0.8rem;
    color: #888;
}

.demo-credentials {
    margin: 20px 0;
}

.demo-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #f8f8f8;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
}

.demo-card i {
    font-size: 1.2rem;
    color: #1a1a1a;
}

.demo-card strong {
    display: block;
    font-size: 0.8rem;
    color: #1a1a1a;
}

.demo-card code {
    font-size: 0.7rem;
    background: #e0e0e0;
    padding: 2px 6px;
    border-radius: 4px;
    color: #1a1a1a;
}

.auth-footer {
    margin-top: 20px;
}

.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    font-size: 0.85rem;
    color: #888;
    transition: 0.2s;
}

.back-link:hover {
    color: #1a1a1a;
}

/* Responsive */
@media (max-width: 480px) {
    .auth-card {
        padding: 30px 25px;
    }
    
    .auth-icon-wrapper {
        width: 65px;
        height: 65px;
    }
    
    .auth-icon {
        font-size: 2rem;
    }
    
    .auth-header h2 {
        font-size: 1.5rem;
    }
    
    .demo-card {
        flex-direction: column;
        text-align: center;
    }
}
</style>
{% endblock %}
