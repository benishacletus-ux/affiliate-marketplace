{% extends "base.html" %}

{% block title %}Server Error - Affiliate Marketplace{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-code">500</div>
        <h1>Internal Server Error</h1>
        <p>Something went wrong on our end. Please try again later.</p>
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <button onclick="location.reload()" class="btn-outline">
                <i class="fas fa-sync-alt"></i> Try Again
            </button>
            <a href="{{ url_for('blog') }}" class="btn-outline">
                <i class="fas fa-envelope"></i> Contact Support
            </a>
        </div>
    </div>
</div>

<style>
/* ============================================
   500 ERROR PAGE - WHITE THEME / BLACK ACCENTS
   ============================================ */

.error-container {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px;
}

.error-code {
    font-size: 8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 20px;
    color: #1a1a1a;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.05);
}

.error-content h1 {
    font-size: 2rem;
    margin-bottom: 15px;
    color: #1a1a1a;
}

.error-content p {
    font-size: 1.1rem;
    margin-bottom: 30px;
    color: #666666;
}

.error-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

.error-actions .btn-primary,
.error-actions .btn-outline {
    padding: 12px 24px;
    font-size: 1rem;
}

.btn-primary {
    background: #1a1a1a;
    color: #ffffff;
    border: none;
    border-radius: 40px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
}

.btn-primary:hover {
    background: #333333;
    transform: translateY(-2px);
}

.btn-outline {
    background: transparent;
    border: 1px solid #cccccc;
    color: #333333;
    border-radius: 40px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    cursor: pointer;
}

.btn-outline:hover {
    border-color: #1a1a1a;
    background: rgba(0,0,0,0.02);
    transform: translateY(-2px);
}

@media (max-width: 768px) {
    .error-code {
        font-size: 5rem;
    }
    
    .error-content h1 {
        font-size: 1.5rem;
    }
    
    .error-actions {
        flex-direction: column;
        align-items: center;
    }
    
    .error-actions .btn-primary,
    .error-actions .btn-outline {
        width: 100%;
        max-width: 250px;
        justify-content: center;
    }
}
</style>
{% endblock %}
